img: icons/svg/aura.svg
system:
  description: >-
    <p>Tienes una máscara, disfraz o atuendo que usas cuando realizas tus
    trabajos más destructivos. Es más una combinación de tarjeta de visita y una
    marca de tu «verdadero yo» que un medio para ocultar tu identidad. Trátala
    como un objeto de equipo con dos casillas de desgaste. Mientras lleves la
    máscara puesta, cualquier ganancia de infamia que sufras se dobla, y
    cualquier ganancia de prestigio resulta en la mitad. También ganas +1 a
    @UUID[Compendium.magpie-root.basic-moves.Item.ZtXsbBig1wQWbmNN]{confiar en
    el destino} y a todos los movimientos específicos del libreto de personaje
    de Bribón. Si alguna vez se destruye la máscara, marcas 4 casillas de
    agotamiento. Si tu máscara es destruida, puedes hacer una nueva cuando pase
    algo de tiempo.</p>

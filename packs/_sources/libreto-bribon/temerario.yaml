system:
  description: >-
    <p>Tienes más suerte cuando te lanzas al peligro sin dudar. Cuando te
    <strong>lances a una situación peligrosa sin premeditación ni
    planificación</strong>, considera que tienes una «Armadura de la suerte»,
    con 1 casilla de desgaste (recuerda que una armadura solo se «destruye»
    cuando tienes que marcar otra casilla de desgaste y todas sus casillas ya
    están llenas). La «Armadura de la suerte» desaparece automáticamente una vez
    que ha pasado el peligro, y la próxima vez que tengas «Armadura de la
    suerte», la obtienes como si fuera nueva con las casillas libres.</p>

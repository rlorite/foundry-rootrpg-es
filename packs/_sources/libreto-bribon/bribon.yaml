system:
  description: >-
    <section class="playbook"><div class="left-column"><img
    src="modules/magpie-root/assets/art/playbooks/The_Adventurer.webp" alt="The
    Adventurer playbook - Image of an Owl in robes" /><div
    class="stat-block"><div class="stat-number"><p>-1</p></div><div
    class="stat-name"><p>Astucia</p></div></div><div class="stat-block"><div
    class="stat-number"><p>+1</p></div><div
    class="stat-name"><p>Carisma</p></div></div><div class="stat-block"><div
    class="stat-number"><p>0</p></div><div
    class="stat-name"><p>Finura</p></div></div><div class="stat-block"><div
    class="stat-number"><p>0</p></div><div
    class="stat-name"><p>Poderío</p></div></div><div class="stat-block"><div
    class="stat-number"><p>+2</p></div><div
    class="stat-name"><p>Suerte</p></div></div><p>Añade +1 a una aptitud hasta
    un máximo de +2.</p><h4>Habilidades con armas</h4><p>Elige una habilidad con
    armas inicial:</p><ul class="checkbox"><li>Ataque vil</li><li>Confundir
    sentidos</li><li>Disparo rápido</li><li>Improvisar arma</li></ul><h4>Proezas
    de granuja</h4><p>Empiezas con estas:</p><p>Acrobacias, Esconderse,
    Infiltración.</p><h4>Equipo</h4><p>Valor inicial: 8</p></div><div><h2
    class="playbook-title">Bribón</h2><p class="description"><em>Eres un
    vagabundo afortunado y peligroso, que actúa más como destructor y
    alborotador que otra cosa, quizá creando caos y destrucción porque
    sí.</em></p><div class="flexrow"><div><h4>Especies</h4><ul><li>Zorro, ratón,
    conejo, pájaro, gato, otra.</li></ul><h4>Comportamiento</h4><ul><li>Taimado,
    no confiable, directo,
    ingenuo.</li></ul></div><div><h4>Detalles</h4><ul><li>Él, ella, elle,
    fluido.</li><li>Sospechoso, empobrecido, pulgoso, con
    cicatrices.</li><li>Máscara completa, mechero de chispa de acero ratuno,
    abrigo demasiado grande, bolsitas de sulfuro.</li></ul></div></div><h3>Tu
    naturaleza <span class="instruction">Elige una</span></h3><ul
    class="checkbox"><li><span class="special-em">Pirómano:</span> Recuperas tu
    contador de agotamiento cuando utilizas métodos innecesariamente
    destructivos o dañinos para resolver un problema.</li><li><span
    class="special-em">Combativo:</span> Recuperas tu contador de agotamiento
    cuando intentas iniciar una pelea contra una oposición
    abrumadora.</li></ul><h3>Tus motivaciones <span class="instruction">Elige
    dos</span></h3><ul class="checkbox"><li><span class="special-em">Caos:
    </span>Mejoras cuando derrocas a una figura u orden tiránico o
    peligrosamente dominante.</li><li><span class="special-em">Emociones
    fuertes:</span> Mejoras cuando escapas de una muerte segura o
    encarcelamiento sin remedio.</li><li><span class="special-em">Crimen:</span>
    Mejoras cuando consigues ilícitamente un botín importante o llevas a cabo
    una operación ilegal contra todo pronóstico.</li><li><span
    class="special-em">Infamia:</span> Mejoras cuando disminuye tu Reputación
    con cualquier facción.</li></ul><h3>Tus conexiones</h3><p>Consulta
    @UUID[Compendium.magpie-root-core.core-book.JournalEntry.rootcore00book00.JournalEntryPage.00makingvagabo00#connections]{Connections}
    para conocer los efectos mecánicos de las conexiones..</p><ul><li><span
    class="special-em">Amigo:</span> <span class="underlines">_________</span> y
    yo nos conocimos hace tiempo y juntos llevamos a cabo una locura imposible.
    ¿Qué hicimos? ¿Por qué?</li><li><span class="special-em">Socio:</span> <span
    class="underlines">_________</span> y yo destruimos un recurso de una
    facción en nombre de una facción contraria. ¿Por
    qué?</li></ul></div></section><section
    class="playbook-moves"><h3>Movimientos del Bribón <span
    class="instruction">Elige tres</span></h3><h4>Personalidad
    explosiva</h4><p>Cuando destruyes algo con medios flagrantemente peligrosos
    (explosivos, llamas incontroladas, etc.), tiras con Suerte en lugar de
    Poderío.</p><h4>Crear para destruir</h4><p>Cuando <strong>utilices
    materiales disponibles para montar un artefacto peligroso</strong>, tira con
    Finura. Si tienes éxito, improvisas algo que haga lo que quieres, pero solo
    una vez. Con un resultado de 10+, elige una opción de las siguientes. Con un
    resultado 7–9, elige dos. El artefacto es:</p><ul><li>Más peligroso de lo
    previsto.</li><li>Más grande o difícil de manejar de lo
    previsto.</li><li>Más inestable y frágil de lo previsto.</li></ul><p>Si
    fallas, necesitas algún componente vital para terminarlo; el DJ te dirá
    cuál.</p><h4>¡Una distracción!</h4><p>Obtienes la proeza de granuja
    @UUID[Compendium.magpie-root.quickstart-feats.Item.sLR59mjS89xbggvR]{Por
    sorpresa} (no cuenta para tu límite). Cuando
    @UUID[Compendium.magpie-root.basic-moves.Item.SDZcZ2HuMER7xzeH]{intentes una
    proeza de granuja} para sorprender a alguien mientras está distraído por
    peligros ambientales (un incendio, una inundación, etc.), tira con Suerte en
    vez de Astucia.</p><h4>Temerario</h4><p>Tienes más suerte cuando te lanzas
    al peligro sin dudar. Cuando te <strong>lances a una situación peligrosa sin
    premeditación ni planificación</strong>, considera que tienes una «Armadura
    de la suerte», con 1 casilla de desgaste (recuerda que una armadura solo se
    «destruye» cuando tienes que marcar otra casilla de desgaste y todas sus
    casillas ya están llenas). La «Armadura de la suerte» desaparece
    automáticamente una vez que ha pasado el peligro, y la próxima vez que
    tengas «Armadura de la suerte», la obtienes como si fuera nueva con las
    casillas libres.</p><h4>Máscara peligrosa</h4><p>Tienes una máscara, disfraz
    o atuendo que usas cuando realizas tus trabajos más destructivos. Es más una
    combinación de tarjeta de visita y una marca de tu «verdadero yo» que un
    medio para ocultar tu identidad. Trátala como un objeto de equipo con dos
    casillas de desgaste. Mientras lleves la máscara puesta, cualquier ganancia
    de infamia que sufras se dobla, y cualquier ganancia de prestigio resulta en
    la mitad. También ganas +1 a
    @UUID[Compendium.magpie-root.basic-moves.Item.ZtXsbBig1wQWbmNN]{confiar en
    el destino} y a todos los movimientos específicos del libreto de personaje
    de Bribón. Si alguna vez se destruye la máscara, marcas 4 casillas de
    agotamiento. Si tu máscara es destruida, puedes hacer una nueva cuando pase
    algo de tiempo.</p><h4>Más vale tener suerte que ser bueno</h4><p>Cuando
    <strong>uses un movimiento con armas (básico o especial)</strong>, marca
    agotamiento para tirar con Suerte en lugar de con la aptitud
    indicada.</p></section><section class="background"><h3>Preguntas sobre el
    trasfondo</h3><div class="two-col"><div><h5>¿A qué sitio llamas
    hogar?</h5><ul class="checkbox"><li><span class="underlines">Al claro
    ____________</span>.</li><li>A la espesura.</li><li>A un lugar lejos de
    aquí.</li></ul><h5>¿Por qué eres un vagabundo?</h5><ul
    class="checkbox"><li>Estoy huyendo por un crimen destructivo.</li><li>Busco
    venganza por mi sufrimiento.</li><li>Deseo derrotar a una
    facción.</li><li>Desconfío de los demás habitantes.</li><li>Quiero liberarme
    de las ataduras de la sociedad.</li></ul></div><div><h5>¿A quién has dejado
    atrás?</h5><ul class="checkbox"><li>A mi maestro.</li><li>A mi
    familia.</li><li>A mi ser querido.</li><li>A mi único defensor.</li><li>A mi
    mejor amigo.</li></ul><p><strong>¿A qué facción has servidor más?
    </strong>(Marca 2 casillas de prestigio con la facción
    apropiada)</p><p><strong>¿Con qué facción te has ganado una enemistad
    especial?</strong> (Marca 1 casilla de infamia con la facción
    apropiada)</p></div></div></section>
